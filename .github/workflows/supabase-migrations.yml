name: Apply Supabase migrations

# Triggers automatically every time you push migration files to main.
# Pushes from GitHub Desktop work — this workflow runs on the GitHub side, no local CLI needed.
#
# Setup is documented in DEPLOY.md. Required repo secrets:
#   - SUPABASE_PROJECT_REF       (the project's ref, e.g. abcdefghijklmnop)
#   - SUPABASE_ACCESS_TOKEN      (personal access token from supabase.com/dashboard/account/tokens)
#   - SUPABASE_DB_PASSWORD       (database password, set when the Supabase project was created)
#
# You can also trigger this manually from GitHub → Actions → "Apply Supabase migrations" → Run workflow.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all
